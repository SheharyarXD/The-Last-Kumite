# THE LAST KUMITE — ld65 Linker Configuration
# NROM-256: 32KB PRG-ROM (2 banks), 8KB CHR-ROM, Mapper 0

MEMORY {
    # Zero Page: 256 bytes
    ZP:       start = $0000, size = $0100, type = rw, define = yes;

    # RAM: $0200-$07FF
    RAM:      start = $0200, size = $0600, type = rw, define = yes;

    # PRG-ROM Bank 0: $8000-$BFFF (fixed)
    PRG0:     start = $8000, size = $4000, file = %O, fill = yes;

    # PRG-ROM Bank 1: $C000-$FFFF (contains reset/IRQ/NMI vectors)
    PRG1:     start = $C000, size = $3FF4, file = %O, fill = yes;

    # Vectors at $FFFA-$FFFF
    VECTORS:  start = $FFFA, size = $0006, file = %O, fill = yes;
}

SEGMENTS {
    # Code segments
    CODE:     load = PRG0, type = ro, start = $8000;
    LIBCODE:  load = PRG0, type = ro;
    RODATA:   load = PRG0, type = ro;

    # Fixed bank (bank 1) — contains runtime code that must be at $C000+
    FIXED:    load = PRG1, type = ro, start = $C000;

    # Vector table
    VECTORS:  load = VECTORS, type = ro;

    # Data tables
    SPRITEDATA:  load = PRG0, type = ro;
    BGDATA:      load = PRG0, type = ro;
    PALETTES:    load = PRG0, type = ro;
    TEXTDATA:    load = PRG0, type = ro;

    # BSS — uninitialized RAM
    BSS:      load = RAM, type = bss, define = yes;
    ZEROPAGE: load = ZP,  type = zp,  define = yes;
}

FEATURES {
    CONDES: type = constructor, label = __CONSTRUCTOR_TABLE__, count = __CONSTRUCTOR_COUNT__;
    CONDES: type = destructor,  label = __DESTRUCTOR_TABLE__,   count = __DESTRUCTOR_COUNT__;
    CONDES: type = interruptor, label = __INTERRUPTOR_TABLE__,  count = __INTERRUPTOR_COUNT__;
}

SYMBOLS {
    # NES stack top
    __STACKTOP__ = $01FF;
    # NES PPU registers base
    PPU_CTRL   = $2000;
    PPU_MASK   = $2001;
    PPU_STATUS = $2002;
    OAM_ADDR   = $2003;
    OAM_DATA   = $2004;
    PPU_SCROLL = $2005;
    PPU_ADDR   = $2006;
    PPU_DATA   = $2007;
    # APU registers
    APU_PULSE1_CTRL  = $4000;
    APU_PULSE1_SWEEP = $4001;
    APU_PULSE1_TIMER = $4002;
    APU_PULSE1_LEN   = $4003;
    APU_PULSE2_CTRL  = $4004;
    APU_PULSE2_SWEEP = $4005;
    APU_PULSE2_TIMER = $4006;
    APU_PULSE2_LEN   = $4007;
    APU_TRI_CTRL     = $4008;
    APU_TRI_TIMER    = $400A;
    APU_TRI_LEN      = $400B;
    APU_NOISE_CTRL   = $400C;
    APU_NOISE_PERIOD = $400E;
    APU_NOISE_LEN    = $400F;
    APU_DMC_CTRL     = $4010;
    APU_CHAN_ENABLE  = $4015;
    APU_FRAME_COUNTER= $4017;
    # Controller
    CTRL1 = $4016;
    CTRL2 = $4017;
    # OAM DMA
    OAM_DMA = $4014;
}
