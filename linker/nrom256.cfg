# THE LAST KUMITE — ld65 linker configuration (NROM, mapper 0)
#
# Produces a flat 32KB PRG-ROM image (no iNES header -- build_rom.py adds
# the 16-byte header afterward and appends the 8KB CHR-ROM produced by
# tools/chr_convert.py). PRG-ROM must come out to exactly 32768 bytes;
# CHR-ROM is supplied separately as chr/tiles.chr (8192 bytes).
#
# Mapper 0 / NROM-256: 32KB PRG-ROM, no bank switching. All code/rodata is
# packed into one flat PRG region; the 6-byte hardware vector table is
# pinned to the top of the address space at $FFFA-$FFFF.

MEMORY {
    ZP:  start = $0000, size = $0100, type = rw, file = "";
    PRG: start = $8000, size = $7FFA, type = ro, file = %O, fill = yes, fillval = $FF;
    VEC: start = $FFFA, size = $0006, type = ro, file = %O, fill = yes, fillval = $FF;
}

SEGMENTS {
    ZEROPAGE: load = ZP,  type = zp;
    CODE:     load = PRG, type = ro, align = $0001;
    RODATA:   load = PRG, type = ro, align = $0001;
    VECTORS:  load = VEC, type = ro;
}
