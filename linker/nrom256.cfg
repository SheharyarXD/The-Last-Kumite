# THE LAST KUMITE — ld65 Linker Configuration
# NROM-256: 32KB PRG-ROM (2 banks), 8KB CHR-ROM, Mapper 0

MEMORY {
    # Zero Page: 256 bytes
    ZP:       start = $0000, size = $0100, type = rw, define = yes;

    # RAM: $0200-$07FF
    RAM:      start = $0200, size = $0600, type = rw, define = yes;

    # PRG-ROM Bank 0: $8000-$BFFF (fixed)
    PRG0:     start = $8000, size = $4000, file = %O, fill = yes;

    # PRG-ROM Bank 1: $C000-$FFF9 (fixed; vectors occupy $FFFA-$FFFF separately)
    PRG1:     start = $C000, size = $3FFA, file = %O, fill = yes;

    # Vectors at $FFFA-$FFFF
    VECTORS:  start = $FFFA, size = $0006, file = %O, fill = yes;
}

SEGMENTS {
    # Code and read-only data — everything lives in the single 32KB PRG-ROM
    # bank since this demo is well under the NROM-256 capacity.
    CODE:     load = PRG0, type = ro, start = $8000;
    RODATA:   load = PRG0, type = ro;

    # Vector table (NMI/RESET/IRQ) — must land at $FFFA-$FFFF
    VECTORS:  load = VECTORS, type = ro;

    # BSS / zero page — reserved for completeness; this project uses
    # hardcoded absolute addresses (see zeropage.asm) rather than ld65-
    # managed allocation, so nothing is explicitly placed here, but the
    # segments must still exist for the linker's internal bookkeeping.
    BSS:      load = RAM, type = bss, define = yes;
    ZEROPAGE: load = ZP,  type = zp,  define = yes;
}


